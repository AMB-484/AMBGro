name: Build Android APK

# Builds an installable debug APK in the cloud (no local Android SDK required).
# Trigger manually from the Actions tab, or on a version tag.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets into the Android project
        run: npx cap sync android

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: growthtrack-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
